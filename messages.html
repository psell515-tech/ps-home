<!DOCTYPE html>
<html>
<head>
  <title>Messages</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 700px;
      margin: 40px auto;
      padding: 0 20px;
      background: #f7f7f7;
      color: #222;
    }

    h1 {
      margin-bottom: 25px;
      font-size: 28px;
      font-weight: 600;
    }

    .msg {
      background: white;
      padding: 18px 20px;
      border-radius: 10px;
      border: 1px solid #ddd;
      margin-bottom: 18px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
      transition: background 0.2s, color 0.2s, border-color 0.2s;
      cursor: pointer;
    }

    .msg.highlight {
      background: #ffe5e5;
      border-color: #cc0000;
      color: #b30000;
      font-weight: bold;
    }

    .date {
      font-size: 12px;
      color: #666;
      margin-bottom: 6px;
    }

    .meta {
      font-size: 14px;
      margin-bottom: 10px;
    }

    button {
      margin-top: 12px;
      padding: 6px 12px;
      background: #d33;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      background: #b00;
    }
  </style>
</head>
<body>
  <h1>Messages</h1>
  <div id="messages">Loading…</div>

  <script>
    function loadMessages() {
      fetch("/messages")
        .then(r => r.json())
        .then(list => {
          const container = document.getElementById("messages");
          container.innerHTML = "";

          list.forEach(m => {
            const div = document.createElement("div");
            div.className = "msg";

            div.innerHTML = `
              <div class="date">${m.created_at}</div>
              <div class="meta"><strong>${m.name}</strong> (${m.email})</div>
              <div class="text">${m.message}</div>
              <button data-key="${m._key}">Delete</button>
            `;

            // Highlight on click
            div.addEventListener("click", () => {
              div.classList.toggle("highlight");
            });

            // Delete button
            div.querySelector("button").addEventListener("click", (e) => {
              e.stopPropagation(); // prevent highlight toggle

              const key = e.target.dataset.key;

              fetch("/delete", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ key })
              })
              .then(r => r.json())
              .then(res => {
                if (res.ok) {
                  div.remove();
                }
              });
            });

            container.appendChild(div);
          });
        });
    }

    loadMessages();
  </script>
</body>
</html>
