<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Patrick Sell</title>

<style>
  body {
    margin: 0;
    padding: 0;
    background: #000;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    height: 100vh;
    overflow-x: hidden;
  }

  #player-wrapper {
    margin-top: 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  #mainVideo {
    width: 272px;
    height: 459px;
    border-radius: 14px;
    object-fit: cover;
    background: #000;
    box-shadow: 0 0 18px rgba(0,0,0,0.35);
  }

  #updateNotice {
    margin-top: 18px;
    font-size: 14px;
    letter-spacing: 0.4px;
    color: rgba(255,255,255,0.65);
    text-align: center;
    font-weight: 300;
    max-width: 280px;
    line-height: 1.45;
  }

  /* CONTACT FORM STYLES */
  #form-wrapper {
    margin-top: 40px;
    width: 90%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  #form-wrapper input,
  #form-wrapper textarea {
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: #111;
    color: white;
    font-size: 15px;
  }

  #form-wrapper textarea {
    height: 120px;
    resize: none;
  }

  #form-wrapper button {
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(135deg, #ff2d55, #8a1f3d);
    color: white;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s cubic-bezier(.25,1.5,.5,1);
  }

  #form-wrapper button:hover {
    transform: translateY(-3px) scale(1.03);
  }

  #success {
    margin-top: 10px;
    text-align: center;
    font-size: 16px;
    display: none;
  }
</style>
</head>

<body>

<div id="player-wrapper">
  <video id="mainVideo" playsinline autoplay muted></video>

  <div id="updateNotice">
    New creative updates are planned for <strong>May 2026</strong>.  
    Thank you for visiting.
  </div>
</div>

<!-- CONTACT FORM -->
<div id="form-wrapper">
<a href="/contact.html" style="color:#888; margin-top:20px; font-size:14px;">Contact Me</a>

</div>

<script>
  const video = document.getElementById("mainVideo");

  const CLIP_1 = "https://hptombstone2work.psell515.workers.dev/r2/patandcroc-ai.mp4?token=my_subway";
  const CLIP_2 = "https://hptombstone2work.psell515.workers.dev/r2/ps-title-sequence.mp4?token=my_subway";

  let state = 1;

  function playClip1() {
    state = 1;
    video.loop = false;
    video.src = CLIP_1;
    video.play();
  }

  function playClip2() {
    state = 2;
    video.loop = false;
    video.src = CLIP_2;
    video.play();
  }

  playClip1();

  video.addEventListener("ended", () => {
    if (state === 1) playClip2();
    else playClip1();
  });

  
</script>

</body>
</html>
