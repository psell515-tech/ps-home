<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Contact Patrick</title>

<link rel="stylesheet" href="contact.css">
</head>

<body style="background:#000; color:#fff; font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin:0; padding:40px 0; display:flex; flex-direction:column; align-items:center;">

<h2 style="font-weight:400; margin-bottom:20px;">Contact</h2>

<div id="form-wrapper">
  <form id="contactForm">
    <input type="text" name="name" placeholder="Your name" required>
    <input type="email" name="email" placeholder="Your email" required>
    <textarea name="message" placeholder="Your message" required></textarea>
    <button type="submit">Send</button>
  </form>

  <div id="success">Message sent. Thank you.</div>
</div>

<script src="contact.js"></script>

</body>
</html>
